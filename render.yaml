services:
  # 1. Auth Service
  - type: web
    name: cortex-auth
    env: docker
    plan: free
    dockerfilePath: backend/services/auth/Dockerfile
    dockerContext: backend
    envVars:
      - key: PORT
        value: 8001
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true

  # 2. Chat Service
  - type: web
    name: cortex-chat
    env: docker
    plan: free
    dockerfilePath: backend/services/chat/Dockerfile
    dockerContext: backend
    envVars:
      - key: PORT
        value: 8002
      - key: MONGODB_URL
        sync: false
      - key: REDIS_URL
        sync: false

  # 3. Agent Service
  - type: web
    name: cortex-agent
    env: docker
    plan: free
    dockerfilePath: backend/services/agent/Dockerfile
    dockerContext: backend
    envVars:
      - key: PORT
        value: 8003
      - key: REDIS_URL
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_BUCKET_NAME
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: AUTH_SERVICE
        fromService:
          name: cortex-auth
          type: web
          property: host
      - key: CHAT_SERVICE
        fromService:
          name: cortex-chat
          type: web
          property: host

  # 4. Billing Service
  - type: web
    name: cortex-billing
    env: docker
    plan: free
    dockerfilePath: backend/services/billing/Dockerfile
    dockerContext: backend
    envVars:
      - key: PORT
        value: 8004
      - key: MONGODB_URL
        sync: false
      - key: VITE_RAZORPAY_KEY
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
      - key: AUTH_SERVICE
        fromService:
          name: cortex-auth
          type: web
          property: host

  # 5. API Gateway
  - type: web
    name: cortex-gateway
    env: docker
    plan: free
    dockerfilePath: backend/gateway/Dockerfile
    dockerContext: backend
    envVars:
      - key: PORT
        value: 8000
      - key: REDIS_URL
        sync: false
      - key: AUTH_SERVICE
        fromService:
          name: cortex-auth
          type: web
          property: host
      - key: CHAT_SERVICE
        fromService:
          name: cortex-chat
          type: web
          property: host
      - key: AGENT_SERVICE
        fromService:
          name: cortex-agent
          type: web
          property: host
      - key: BILLING_SERVICE
        fromService:
          name: cortex-billing
          type: web
          property: host
