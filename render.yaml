services:
  # 1. Auth Service
  - type: web
    name: cortex-auth
    env: docker
    plan: free
    dockerfilePath: backend/services/auth/Dockerfile
    dockerContext: backend
    envVars:
      - key: PORT
        value: 8001
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false

  # 2. Chat Service
  - type: web
    name: cortex-chat
    env: docker
    plan: free
    dockerfilePath: backend/services/chat/Dockerfile
    dockerContext: backend
    envVars:
      - key: PORT
        value: 8002
      - key: MONGODB_URL
        sync: false
      - key: REDIS_URL
        sync: false

  # 3. Agent Service
  - type: web
    name: cortex-agent
    env: docker
    plan: free
    dockerfilePath: backend/services/agent/Dockerfile
    dockerContext: backend
    envVars:
      - key: PORT
        value: 8003
      - key: REDIS_URL
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_BUCKET_NAME
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: AUTH_SERVICE
        value: http://cortex-auth:8001
      - key: CHAT_SERVICE
        value: http://cortex-chat:8002

  # 4. Billing Service
  - type: web
    name: cortex-billing
    env: docker
    plan: free
    dockerfilePath: backend/services/billing/Dockerfile
    dockerContext: backend
    envVars:
      - key: PORT
        value: 8004
      - key: MONGODB_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: AUTH_SERVICE
        value: http://cortex-auth:8001

  # 5. API Gateway
  - type: web
    name: cortex-gateway
    env: docker
    plan: free
    dockerfilePath: backend/gateway/Dockerfile
    dockerContext: backend
    envVars:
      - key: PORT
        value: 8000
      - key: REDIS_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: AUTH_SERVICE
        value: http://cortex-auth:8001
      - key: CHAT_SERVICE
        value: http://cortex-chat:8002
      - key: AGENT_SERVICE
        value: http://cortex-agent:8003
      - key: BILLING_SERVICE
        value: http://cortex-billing:8004
